version: "3.9"
name: gimao-prod
services:
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gimao
      MYSQL_USER: gimao_user
      MYSQL_PASSWORD: gimao_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gimao_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=gimao.settings
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_PASSWORD=admin
      - DJANGO_SUPERUSER_EMAIL=admin@admin.com
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      - gimao_network
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_dist:/app/dist
    networks:
      - gimao_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
      - frontend_dist:/usr/share/nginx/html:ro
    networks:
      - gimao_network
    command: >
      sh -c "nginx -t && nginx -g 'daemon off;'"

volumes:
  db_data:
  media_data:
  static_data:
  frontend_dist:

networks:
  gimao_network:
    driver: bridge